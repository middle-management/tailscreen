name: Build

# CI runs only on pushes to `main` (post-merge verification) and on
# pull-requests. Direct pushes to `claude/**` feature branches no longer
# trigger CI — the same branch's PR already covers it, and macOS minutes
# are 10× Linux. Doc-only edits skip CI entirely.
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

# A new push to the same branch cancels the previous in-flight build —
# avoids paying for runs the user no longer cares about.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Initialize all submodules

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: TailscaleKitPackage/upstream/libtailscale/go.sum

      - name: Build
        run: make build

      - name: Run tests
        run: make test

  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint (baseline-gated)
        run: make lint

  test-tsan:
    # Thread Sanitizer build. Catches lock/continuation races that
    # strict-concurrency lets through. Allowed to fail (TSan can flag
    # known-OK patterns in third-party C code) — informational only.
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: TailscaleKitPackage/upstream/libtailscale/go.sum
      - name: Build libtailscale
        run: make tailscale
      - name: Run tests under TSan
        run: make test-tsan
