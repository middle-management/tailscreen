name: Build and Test

on:
  push:
    branches: [ main, claude/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on macOS
    runs-on: macos-13

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Show Swift version
      run: swift --version

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Validate project structure
      run: ./validate.sh

    - name: Build (Debug)
      run: swift build -v

    - name: Build (Release)
      run: swift build -c release -v

    - name: Check binary
      run: |
        ls -lh .build/release/Cuple
        file .build/release/Cuple
        otool -L .build/release/Cuple || true

    - name: Upload binary as artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cuple-macOS
        path: .build/release/Cuple
        retention-days: 30

    - name: Create build report
      if: always()
      run: |
        echo "## Build Report" > build-report.md
        echo "" >> build-report.md
        echo "**Status:** ${{ job.status }}" >> build-report.md
        echo "**Runner:** ${{ runner.os }} ${{ runner.arch }}" >> build-report.md
        echo "**Swift Version:**" >> build-report.md
        echo '```' >> build-report.md
        swift --version >> build-report.md
        echo '```' >> build-report.md
        echo "" >> build-report.md
        if [ -f .build/release/Cuple ]; then
          echo "**Binary Info:**" >> build-report.md
          echo '```' >> build-report.md
          ls -lh .build/release/Cuple >> build-report.md
          file .build/release/Cuple >> build-report.md
          echo '```' >> build-report.md
        fi

    - name: Upload build report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-report
        path: build-report.md
        retention-days: 30
