title: Tailscreen
description: Encrypted, low-latency peer-to-peer screen sharing over Tailscale — a macOS menubar app.
url: https://tailscreen.dev
baseurl: ""
repository: middle-management/tailscreen
logo: "/assets/logo.svg"

remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

search_enabled: true
heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/middle-management/tailscreen"
  "Releases":
    - "https://github.com/middle-management/tailscreen/releases"

aux_links_new_tab: true

footer_content: 'Tailscreen is MIT-licensed. Source on <a href="https://github.com/middle-management/tailscreen">GitHub</a>.'

# Don't ship the local dev files
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .jekyll-cache/
  - superpowers/

permalink: pretty
